<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sem conexão - Abastecimento Vipe</title>
  <style>
    :root {
      --yellow: #fbcc04;
      --yellow-soft: #f8dc28;
      --charcoal: #3C3D3E;
      --white: #ECEDEC;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(180deg, var(--yellow), var(--yellow-soft));
      color: #1b1b1b;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(60,61,62,0.2);
      border-radius: 16px;
      text-align: center;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
    }
    img {
      width: 84px;
      height: 84px;
      border-radius: 12px;
      margin-bottom: 14px;
      object-fit: cover;
      border: 1px solid rgba(60,61,62,0.25);
      background: #fff;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 22px;
      color: var(--charcoal);
    }
    p {
      margin: 0;
      font-size: 14px;
      color: #2f2f2f;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main class="card">
      <img src="/assets/pwa/icon-192.png" alt="Logo Abastecimento Vipe" />
    <h1>Você está offline</h1>
      <p>Abastecimento Vipe - (Garagem). Assim que a conexão voltar, atualize a página.</p>
  </main>
</body>
</html>
